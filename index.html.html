<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Al Noor Restaurant — Owner Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3d;
    --gold: #c9973a;
    --gold-light: #e8b84b;
    --gold-dim: rgba(201,151,58,0.15);
    --green: #2dd4a0;
    --green-dim: rgba(45,212,160,0.12);
    --red: #f06464;
    --red-dim: rgba(240,100,100,0.12);
    --blue: #5b8ef0;
    --blue-dim: rgba(91,142,240,0.12);
    --orange: #f0914a;
    --orange-dim: rgba(240,145,74,0.12);
    --text: #e8e8f0;
    --text-muted: #7a7a9a;
    --text-dim: #4a4a6a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }
  body::before { content: ''; position: fixed; top: -200px; left: -200px; width: 600px; height: 600px; background: radial-gradient(circle, rgba(201,151,58,0.06) 0%, transparent 70%); pointer-events: none; z-index: 0; }
  .sidebar { position: fixed; left: 0; top: 0; width: 240px; height: 100vh; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 100; padding: 0 0 24px 0; }
  .logo { padding: 28px 24px 24px; border-bottom: 1px solid var(--border); }
  .logo-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 900; color: var(--gold); line-height: 1.2; }
  .logo-sub { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; margin-top: 4px; }
  .nav { padding: 20px 12px; flex: 1; display: flex; flex-direction: column; gap: 4px; }
  .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 500; color: var(--text-muted); transition: all 0.2s; border: none; background: none; width: 100%; text-align: left; }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: var(--gold-dim); color: var(--gold); }
  .nav-icon { font-size: 18px; width: 22px; text-align: center; }
  .nav-badge { margin-left: auto; background: var(--red); color: white; font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 20px; min-width: 22px; text-align: center; }
  .sidebar-footer { padding: 16px 12px 0; border-top: 1px solid var(--border); }
  .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); margin-right: 8px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .status-text { font-size: 13px; color: var(--text-muted); }
  .main { margin-left: 240px; padding: 32px; position: relative; z-index: 1; }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
  .page-title { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; color: var(--text); }
  .page-date { font-size: 14px; color: var(--text-muted); margin-top: 4px; }
  .header-actions { display: flex; gap: 12px; align-items: center; }
  .refresh-btn { display: flex; align-items: center; gap: 8px; padding: 10px 18px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); color: var(--text-muted); font-size: 14px; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.2s; }
  .refresh-btn:hover { border-color: var(--gold); color: var(--gold); }
  .config-banner { background: var(--gold-dim); border: 1px solid rgba(201,151,58,0.3); border-radius: 12px; padding: 14px 20px; margin-bottom: 28px; display: flex; align-items: center; gap: 12px; font-size: 13px; color: var(--gold-light); flex-wrap: wrap; }
  .config-banner input { background: rgba(0,0,0,0.3); border: 1px solid rgba(201,151,58,0.4); border-radius: 8px; padding: 6px 12px; color: var(--gold-light); font-family: 'DM Sans', sans-serif; font-size: 13px; flex: 1; min-width: 200px; max-width: 380px; outline: none; }
  .config-banner button { background: var(--gold); border: none; border-radius: 8px; padding: 6px 16px; color: #0a0a0f; font-weight: 700; font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; transition: background 0.2s; }
  .config-banner button:hover { background: var(--gold-light); }
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 22px; position: relative; overflow: hidden; transition: transform 0.2s, border-color 0.2s; }
  .stat-card:hover { transform: translateY(-2px); border-color: var(--gold-dim); }
  .stat-card::before { content: ''; position: absolute; top: 0; right: 0; width: 80px; height: 80px; border-radius: 50%; opacity: 0.08; transform: translate(20px, -20px); }
  .stat-card.gold::before { background: var(--gold); }
  .stat-card.green::before { background: var(--green); }
  .stat-card.blue::before { background: var(--blue); }
  .stat-card.orange::before { background: var(--orange); }
  .stat-icon { font-size: 22px; margin-bottom: 14px; display: inline-block; padding: 10px; border-radius: 10px; }
  .stat-card.gold .stat-icon { background: var(--gold-dim); }
  .stat-card.green .stat-icon { background: var(--green-dim); }
  .stat-card.blue .stat-icon { background: var(--blue-dim); }
  .stat-card.orange .stat-icon { background: var(--orange-dim); }
  .stat-value { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 700; line-height: 1; margin-bottom: 6px; }
  .stat-card.gold .stat-value { color: var(--gold); }
  .stat-card.green .stat-value { color: var(--green); }
  .stat-card.blue .stat-value { color: var(--blue); }
  .stat-card.orange .stat-value { color: var(--orange); }
  .stat-label { font-size: 13px; color: var(--text-muted); }
  .sections-grid { display: grid; grid-template-columns: 1fr 380px; gap: 20px; }
  .section { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
  .section-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 24px; border-bottom: 1px solid var(--border); }
  .section-title { font-size: 15px; font-weight: 600; color: var(--text); }
  .section-badge { font-size: 12px; padding: 4px 10px; border-radius: 20px; font-weight: 600; }
  .badge-live { background: var(--green-dim); color: var(--green); }
  .badge-today { background: var(--blue-dim); color: var(--blue); }
  .filter-tabs { display: flex; gap: 4px; padding: 16px 24px; border-bottom: 1px solid var(--border); overflow-x: auto; }
  .filter-tab { padding: 6px 14px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; background: none; color: var(--text-muted); white-space: nowrap; transition: all 0.2s; font-family: 'DM Sans', sans-serif; }
  .filter-tab:hover { background: var(--surface2); color: var(--text); }
  .filter-tab.active { background: var(--gold-dim); color: var(--gold); }
  .orders-table { width: 100%; }
  .order-row { display: grid; grid-template-columns: 120px 1fr 100px 110px 130px 100px; align-items: center; padding: 14px 24px; border-bottom: 1px solid var(--border); transition: background 0.15s; gap: 12px; }
  .order-row:hover { background: var(--surface2); }
  .order-row:last-child { border-bottom: none; }
  .order-row.header-row { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-dim); font-weight: 600; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
  .order-row.header-row:hover { background: none; }
  .order-id { font-family: 'DM Sans', monospace; font-size: 12px; font-weight: 600; color: var(--gold); }
  .order-customer { font-size: 13px; font-weight: 500; }
  .order-items { font-size: 12px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .order-total { font-size: 14px; font-weight: 600; color: var(--green); }
  .order-payment { font-size: 12px; color: var(--text-muted); }
  .status-badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; white-space: nowrap; }
  .status-badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .status-pending { background: var(--orange-dim); color: var(--orange); }
  .status-confirmed { background: var(--blue-dim); color: var(--blue); }
  .status-preparing { background: rgba(180,100,240,0.12); color: #b464f0; }
  .status-out_for_delivery { background: var(--gold-dim); color: var(--gold); }
  .status-delivered { background: var(--green-dim); color: var(--green); }
  .status-cancelled { background: var(--red-dim); color: var(--red); }
  .status-select { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 5px 8px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 12px; cursor: pointer; outline: none; width: 100%; }
  .status-select:focus { border-color: var(--gold); }
  .right-panel { display: flex; flex-direction: column; gap: 20px; }
  .analytics-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; }
  .analytics-title { font-size: 15px; font-weight: 600; margin-bottom: 20px; color: var(--text); }
  .chart-bar-container { display: flex; flex-direction: column; gap: 12px; }
  .chart-item { display: flex; flex-direction: column; gap: 6px; }
  .chart-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-muted); }
  .chart-label span:last-child { color: var(--text); font-weight: 600; }
  .chart-bar-bg { height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
  .chart-bar-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--gold), var(--gold-light)); transition: width 1s ease; }
  .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px; gap: 16px; color: var(--text-muted); }
  .spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty-state { text-align: center; padding: 48px 24px; color: var(--text-muted); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-text { font-size: 14px; }
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 14px 20px; font-size: 14px; color: var(--text); z-index: 1000; transform: translateY(100px); opacity: 0; transition: all 0.3s; max-width: 320px; }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { border-color: var(--green); color: var(--green); }
  .toast.error { border-color: var(--red); color: var(--red); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  @media (max-width: 1200px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } .sections-grid { grid-template-columns: 1fr; } }
  @media (max-width: 768px) { .sidebar { width: 100%; height: auto; position: relative; } .main { margin-left: 0; padding: 16px; } .order-row { grid-template-columns: 1fr 1fr; } }
</style>
</head>
<body>
<div class="sidebar">
  <div class="logo">
    <div class="logo-title">Al Noor</div>
    <div class="logo-sub">Restaurant Dashboard</div>
  </div>
  <nav class="nav">
    <button class="nav-item active" onclick="showTab('orders', event)">
      <span class="nav-icon">📋</span> Live Orders
      <span class="nav-badge" id="pending-count">0</span>
    </button>
    <button class="nav-item" onclick="showTab('analytics', event)">
      <span class="nav-icon">📊</span> Analytics
    </button>
    <button class="nav-item" onclick="showTab('all-orders', event)">
      <span class="nav-icon">🗂️</span> All Orders
    </button>
  </nav>
  <div class="sidebar-footer">
    <div class="nav-item">
      <span class="status-dot"></span>
      <span class="status-text">Live Connected</span>
    </div>
  </div>
</div>

<div class="main">
  <div class="header">
    <div>
      <div class="page-title" id="page-heading">Live Orders</div>
      <div class="page-date" id="current-date"></div>
    </div>
    <div class="header-actions">
      <button class="refresh-btn" onclick="loadAll()">⟳ Refresh</button>
    </div>
  </div>

  <div class="config-banner" id="config-banner">
    ⚙️ Supabase Setup:
    <input type="text" id="supabase-url" placeholder="https://YOUR_PROJECT.supabase.co" />
    <input type="text" id="supabase-key" placeholder="your-anon-key" style="max-width:280px"/>
    <button onclick="saveConfig()">Connect</button>
  </div>

  <div class="stats-grid">
    <div class="stat-card gold"><div class="stat-icon">💰</div><div class="stat-value" id="stat-revenue">0</div><div class="stat-label">Today's Revenue (PKR)</div></div>
    <div class="stat-card green"><div class="stat-icon">✅</div><div class="stat-value" id="stat-delivered">0</div><div class="stat-label">Delivered Today</div></div>
    <div class="stat-card blue"><div class="stat-icon">📦</div><div class="stat-value" id="stat-total">0</div><div class="stat-label">Total Orders Today</div></div>
    <div class="stat-card orange"><div class="stat-icon">⏳</div><div class="stat-value" id="stat-pending">0</div><div class="stat-label">Pending Orders</div></div>
  </div>

  <div class="tab-content active" id="tab-orders">
    <div class="section">
      <div class="section-header"><span class="section-title">Live Orders</span><span class="section-badge badge-live">● Live</span></div>
      <div class="filter-tabs">
        <button class="filter-tab active" onclick="filterOrders('all', this)">All</button>
        <button class="filter-tab" onclick="filterOrders('pending', this)">Pending</button>
        <button class="filter-tab" onclick="filterOrders('confirmed', this)">Confirmed</button>
        <button class="filter-tab" onclick="filterOrders('preparing', this)">Preparing</button>
        <button class="filter-tab" onclick="filterOrders('out_for_delivery', this)">Out for Delivery</button>
        <button class="filter-tab" onclick="filterOrders('delivered', this)">Delivered</button>
        <button class="filter-tab" onclick="filterOrders('cancelled', this)">Cancelled</button>
      </div>
      <div id="orders-container"><div class="loading"><div class="spinner"></div><span>Loading orders...</span></div></div>
    </div>
  </div>

  <div class="tab-content" id="tab-analytics">
    <div class="sections-grid">
      <div class="section">
        <div class="section-header"><span class="section-title">Revenue Overview</span><span class="section-badge badge-today">Today</span></div>
        <div style="padding: 24px;" id="analytics-content"><div class="loading"><div class="spinner"></div></div></div>
      </div>
      <div class="right-panel">
        <div class="analytics-card"><div class="analytics-title">📊 Status Breakdown</div><div class="chart-bar-container" id="status-chart"></div></div>
        <div class="analytics-card"><div class="analytics-title">💳 Payment Methods</div><div class="chart-bar-container" id="payment-chart"></div></div>
      </div>
    </div>
  </div>

  <div class="tab-content" id="tab-all-orders">
    <div class="section">
      <div class="section-header"><span class="section-title">All Orders History</span><span class="section-badge badge-today">Complete History</span></div>
      <div id="all-orders-container"><div class="loading"><div class="spinner"></div></div></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let SUPABASE_URL = '';
  let SUPABASE_KEY = '';
  let allOrders = [];
  let currentFilter = 'all';

  window.onload = () => {
    document.getElementById('current-date').textContent = new Date().toLocaleDateString('en-PK', {
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });
    const savedUrl = localStorage.getItem('sb_url');
    const savedKey = localStorage.getItem('sb_key');
    if (savedUrl && savedKey) {
      SUPABASE_URL = savedUrl;
      SUPABASE_KEY = savedKey;
      document.getElementById('supabase-url').value = savedUrl;
      document.getElementById('supabase-key').value = savedKey;
      document.getElementById('config-banner').style.display = 'none';
      loadAll();
      setInterval(loadAll, 30000);
    }
  };

  function saveConfig() {
    SUPABASE_URL = document.getElementById('supabase-url').value.trim().replace(/\/$/, '');
    SUPABASE_KEY = document.getElementById('supabase-key').value.trim();
    if (!SUPABASE_URL || !SUPABASE_KEY) { showToast('URL aur Key dono required hain!', 'error'); return; }
    localStorage.setItem('sb_url', SUPABASE_URL);
    localStorage.setItem('sb_key', SUPABASE_KEY);
    document.getElementById('config-banner').style.display = 'none';
    showToast('✅ Connected successfully!', 'success');
    loadAll();
    setInterval(loadAll, 30000);
  }

  async function fetchOrders(limit = 200) {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/restaurant_orders?select=*&order=created_at.desc&limit=${limit}`,
      { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` } }
    );
    if (!res.ok) throw new Error('Failed to fetch');
    return res.json();
  }

  async function loadAll() {
    if (!SUPABASE_URL || !SUPABASE_KEY) return;
    try {
      allOrders = await fetchOrders();
      updateStats();
      renderOrders(currentFilter);
      renderAnalytics();
      renderAllOrders();
    } catch(e) {
      showToast('Connection error. Check your credentials.', 'error');
    }
  }

  function updateStats() {
    const today = new Date().toDateString();
    const todayOrders = allOrders.filter(o => new Date(o.created_at).toDateString() === today);
    const revenue = todayOrders.filter(o => o.status === 'delivered').reduce((s, o) => s + (parseFloat(o.total) || 0), 0);
    const delivered = todayOrders.filter(o => o.status === 'delivered').length;
    const pending = allOrders.filter(o => ['pending','confirmed','preparing','out_for_delivery'].includes(o.status)).length;
    document.getElementById('stat-revenue').textContent = revenue.toLocaleString();
    document.getElementById('stat-delivered').textContent = delivered;
    document.getElementById('stat-total').textContent = todayOrders.length;
    document.getElementById('stat-pending').textContent = pending;
    document.getElementById('pending-count').textContent = pending;
  }

  function renderOrders(filter) {
    currentFilter = filter;
    const filtered = filter === 'all' ? allOrders : allOrders.filter(o => o.status === filter);
    const container = document.getElementById('orders-container');
    if (!filtered.length) {
      container.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">Koi order nahi mila</div></div>`;
      return;
    }
    container.innerHTML = `<div class="orders-table"><div class="order-row header-row"><div>Order ID</div><div>Customer</div><div>Items</div><div>Total</div><div>Payment</div><div>Status</div></div>${filtered.map(o => orderRow(o)).join('')}</div>`;
  }

  function orderRow(o) {
    const time = new Date(o.created_at).toLocaleTimeString('en-PK', {hour:'2-digit', minute:'2-digit'});
    return `<div class="order-row">
      <div><div class="order-id">${o.order_id || '#' + o.id}</div><div style="font-size:11px;color:var(--text-dim);margin-top:2px">${time}</div></div>
      <div><div class="order-customer">${o.name || '-'}</div><div class="order-items">${o.phone || ''}</div></div>
      <div class="order-items" title="${o.items}">${o.items || '-'}</div>
      <div class="order-total">PKR ${(parseFloat(o.total)||0).toLocaleString()}</div>
      <div class="order-payment">${o.payment_method || '-'}</div>
      <div><select class="status-select" onchange="updateStatus('${o.order_id || o.id}', this.value, ${o.id})">
        ${['pending','confirmed','preparing','out_for_delivery','delivered','cancelled'].map(s =>
          `<option value="${s}" ${o.status === s ? 'selected' : ''}>${{pending:'Pending',confirmed:'Confirmed',preparing:'Preparing',out_for_delivery:'On The Way',delivered:'Delivered',cancelled:'Cancelled'}[s]}</option>`
        ).join('')}
      </select></div>
    </div>`;
  }

  async function updateStatus(orderId, newStatus, numericId) {
    try {
      const query = orderId && orderId !== String(numericId) ? `order_id=eq.${orderId}` : `id=eq.${numericId}`;
      const res = await fetch(`${SUPABASE_URL}/rest/v1/restaurant_orders?${query}`, {
        method: 'PATCH',
        headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', Prefer: 'return=minimal' },
        body: JSON.stringify({ status: newStatus, updated_at: new Date().toISOString() })
      });
      if (res.ok) { showToast(`✅ Status updated: ${newStatus}`, 'success'); await loadAll(); }
      else { showToast('Update failed!', 'error'); }
    } catch(e) { showToast('Error updating status', 'error'); }
  }

  function renderAnalytics() {
    const today = new Date().toDateString();
    const todayOrders = allOrders.filter(o => new Date(o.created_at).toDateString() === today);
    const totalRevenue = allOrders.filter(o => o.status === 'delivered').reduce((s,o) => s + (parseFloat(o.total)||0), 0);
    const todayRevenue = todayOrders.filter(o => o.status === 'delivered').reduce((s,o) => s + (parseFloat(o.total)||0), 0);
    const avgOrder = allOrders.length ? (allOrders.reduce((s,o) => s+(parseFloat(o.total)||0),0)/allOrders.length).toFixed(0) : 0;
    document.getElementById('analytics-content').innerHTML = `
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-bottom:24px">
        ${statBox('Total Revenue', 'PKR ' + totalRevenue.toLocaleString(), 'var(--gold)')}
        ${statBox("Today's Revenue", 'PKR ' + todayRevenue.toLocaleString(), 'var(--green)')}
        ${statBox('Avg Order Value', 'PKR ' + parseInt(avgOrder).toLocaleString(), 'var(--blue)')}
      </div>
      <div style="font-size:13px;color:var(--text-muted);margin-bottom:12px">Today's Orders Timeline</div>
      <div style="display:flex;gap:4px;align-items:flex-end;height:80px">${generateHourlyBars(todayOrders)}</div>
      <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text-dim);margin-top:6px"><span>12PM</span><span>3PM</span><span>6PM</span><span>9PM</span><span>12AM</span></div>`;
    const statuses = ['pending','confirmed','preparing','out_for_delivery','delivered','cancelled'];
    const statusLabels = {pending:'Pending',confirmed:'Confirmed',preparing:'Preparing',out_for_delivery:'On The Way',delivered:'Delivered',cancelled:'Cancelled'};
    const max = Math.max(...statuses.map(s => allOrders.filter(o=>o.status===s).length), 1);
    document.getElementById('status-chart').innerHTML = statuses.map(s => {
      const count = allOrders.filter(o => o.status === s).length;
      return `<div class="chart-item"><div class="chart-label"><span>${statusLabels[s]}</span><span>${count}</span></div><div class="chart-bar-bg"><div class="chart-bar-fill" style="width:${Math.round((count/max)*100)}%"></div></div></div>`;
    }).join('');
    const cashCount = allOrders.filter(o => (o.payment_method||'').toLowerCase().includes('cash')).length;
    const jazzCount = allOrders.filter(o => (o.payment_method||'').toLowerCase().includes('jazz')).length;
    const othersCount = allOrders.length - cashCount - jazzCount;
    const pmMax = Math.max(cashCount, jazzCount, othersCount, 1);
    document.getElementById('payment-chart').innerHTML = [['💵 Cash on Delivery', cashCount],['📱 JazzCash', jazzCount],['🔄 Other', othersCount]].map(([label, count]) =>
      `<div class="chart-item"><div class="chart-label"><span>${label}</span><span>${count}</span></div><div class="chart-bar-bg"><div class="chart-bar-fill" style="width:${Math.round((count/pmMax)*100)}%"></div></div></div>`).join('');
  }

  function statBox(label, value, color) {
    return `<div style="background:var(--surface2);border-radius:12px;padding:16px;border:1px solid var(--border)"><div style="font-size:12px;color:var(--text-muted);margin-bottom:8px">${label}</div><div style="font-size:20px;font-weight:700;color:${color};font-family:'Playfair Display',serif">${value}</div></div>`;
  }

  function generateHourlyBars(orders) {
    const hours = Array.from({length:12}, (_,i) => i+12);
    const counts = hours.map(h => orders.filter(o => new Date(o.created_at).getHours() === h % 24).length);
    const max = Math.max(...counts, 1);
    return counts.map((c,i) => `<div style="flex:1;background:${c>0?'var(--gold)':'var(--surface2)'};height:${Math.max((c/max)*100,8)}%;border-radius:3px 3px 0 0;opacity:${c>0?1:0.3}" title="${hours[i]}:00 - ${c} orders"></div>`).join('');
  }

  function renderAllOrders() {
    const container = document.getElementById('all-orders-container');
    if (!allOrders.length) { container.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">Koi order nahi</div></div>`; return; }
    container.innerHTML = `<div class="orders-table"><div class="order-row header-row"><div>Order ID</div><div>Customer</div><div>Items</div><div>Total</div><div>Payment</div><div>Status</div></div>${allOrders.map(o => orderRow(o)).join('')}</div>`;
  }

  function filterOrders(filter, btn) {
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    renderOrders(filter);
  }

  function showTab(tab, event) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    if (event && event.currentTarget) event.currentTarget.classList.add('active');
    const titles = { orders: 'Live Orders', analytics: 'Analytics', 'all-orders': 'All Orders' };
    document.getElementById('page-heading').textContent = titles[tab];
    if (tab === 'analytics') renderAnalytics();
    if (tab === 'all-orders') renderAllOrders();
  }

  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show ' + type;
    setTimeout(() => t.className = 'toast', 3000);
  }
</script>
</body>
</html>
